version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: snyk_metabase_backend
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - shared_scans:/scans
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASS}@db:5432/${DB_NAME}
      - SNYK_SCANNER_URL=http://snyk-scanner:3002
    depends_on:
      - db
      - snyk-scanner

  snyk-scanner:
    build:
      context: ./snyk-scanner
      dockerfile: Dockerfile
    container_name: snyk_scanner_service
    volumes:
      - shared_scans:/scans
    environment:
      - SNYK_TOKEN=${SNYK_TOKEN}
    # Port is internal to the Docker network, no need to expose to host

  db:
    image: postgres:15-alpine
    container_name: snyk_metabase_db
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db_init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"

  metabase:
    image: metabase/metabase:latest
    container_name: snyk_metabase_dashboard
    ports:
      - "3001:3000"
    environment:
      - MB_DB_TYPE=postgres
      - MB_DB_DBNAME=${DB_NAME}
      - MB_DB_PORT=5432
      - MB_DB_USER=${DB_USER}
      - MB_DB_PASS=${DB_PASS}
      - MB_DB_HOST=db
    depends_on:
      - db

volumes:
  shared_scans:
    driver: local
  db_data:
    driver: local
